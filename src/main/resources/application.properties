spring.application.name=garage-genie-be

# PostgreSQL - Supabase Session Pooler (IPv4 compatible, required for Railway)
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.qnudwxjogreteyguzvbf
spring.datasource.password=Activa@2274
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings for Supabase pooler
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server - use PORT env var from Railway, fallback to 8081
server.port=${PORT:8081}

# JWT
app.jwt.secret=GarageGenieSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.garagegenie=INFO
