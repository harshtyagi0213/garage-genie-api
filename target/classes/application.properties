spring.application.name=garage-genie-be

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5436/postgres
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8081

# JWT
app.jwt.secret=GarageGenieSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.garagegenie=DEBUG
